# Railway / Nixpacks build configuration
# בונה גם backend (Python) וגם frontend (Node) ומריץ אותם כשירות יחיד:
# FastAPI מגיש את ה-React build מ-frontend/dist/.

[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
