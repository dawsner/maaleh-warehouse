server {
    listen 80;
    server_name YOUR_DOMAIN.com;
    root /var/www/warehouse/public_html;
    index index.html;

    # API → FastAPI
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React SPA — כל route חוזר ל-index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
