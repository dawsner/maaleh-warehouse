# Render Blueprint — מערכת מחסן מעלה
# מגדיר את הצד הצד ואת ה-frontend, מחבר ביניהם, ויוצר disk עבור ה-DB.
# שימוש: ב-Render → New → Blueprint → חבר את הרפו → Apply.

services:
  # ---- BACKEND (FastAPI) -------------------------------------------------
  # FREE tier - נרדם אחרי 15 דקות חוסר פעילות. DB ייאתחל בכל cold start
  # (seed.py רץ אוטומטית). מתאים לדמו, לא ל-production.
  - type: web
    name: maaleh-warehouse-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: LOGIN_RATE_LIMIT
        value: "5"
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: maaleh-warehouse-web
          property: hostport

  # ---- FRONTEND (React + Vite static build) ------------------------------
  - type: web
    name: maaleh-warehouse-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: maaleh-warehouse-api
          property: hostport
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      # תמיכה ב-React Router (כל URL לא קיים → index.html)
      - type: rewrite
        source: /*
        destination: /index.html
